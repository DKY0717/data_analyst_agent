<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="从零学习 Data Analyst Agent：自然语言分析、NL2SQL、安全治理、LangGraph、Vue、测试与部署"
    />
    <title>从零学习 Data Analyst Agent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
    <style>
      :root {
        --theme-color: #176b5b;
      }

      .markdown-section {
        max-width: 920px;
      }

      .markdown-section blockquote {
        border-left-color: #176b5b;
        background: #f4faf8;
        padding: 0.8rem 1rem;
      }

      .markdown-section code {
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="app">课程正在加载，请稍候。</div>
    <script>
      // Docsify 直接读取仓库中的 Markdown，避免再维护一份独立站点内容。
      window.$docsify = {
        name: "从零学习 Data Analyst Agent",
        repo: "",
        homepage: "README.md",
        loadSidebar: true,
        subMaxLevel: 3,
        auto2top: true,
        relativePath: true,
        search: {
          placeholder: "搜索课程",
          noData: "没有找到相关内容",
          depth: 4,
        },
        pagination: {
          previousText: "上一章",
          nextText: "下一章",
          crossChapter: true,
        },
        copyCode: {
          buttonText: "复制代码",
          errorText: "复制失败",
          successText: "已复制",
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-sql.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>
      // 流程图由 Mermaid 在浏览器端渲染，Markdown 源文件仍可在普通编辑器中阅读。
      mermaid.initialize({ startOnLoad: true, securityLevel: "strict" });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/docsify-mermaid@2/dist/docsify-mermaid.js"></script>
  </body>
</html>
