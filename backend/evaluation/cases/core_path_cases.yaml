  - id: analyst_row_filter_demo
    question: 统计 2024 年每个月的销售额
    category: permission
    demo_role: analyst
    linked_cases:
      - source: permission
        id: analyst_order_row_filter
    expected_surfaces: [answer, sql, chart, permission_observability, row_filter_region_scope]
    success_criteria: 展示 analyst 查询订单指标时 SQL 被行级过滤改写。

  - id: analyst_customer_name_block_demo
