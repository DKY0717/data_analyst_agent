cases:
  - id: monthly_sales_demo
    question: 统计 2024 年每个月的销售额
    category: business_success
    demo_role: analyst
    linked_cases:
      - source: nl2sql
        id: monthly_sales_2024
      - source: golden_result
        id: monthly_sales_2024
    expected_surfaces: [answer, sql, chart, table, audit_report, permission_observability]
    success_criteria: 展示月度趋势图、SQL、结果表和 analyst 行级过滤审计。

  - id: top_products_demo
    question: 找出销售额最高的 5 个商品
    category: business_success
