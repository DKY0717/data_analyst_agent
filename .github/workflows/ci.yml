name: CI

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests (DuckDB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run Python lint
        run: python -m ruff check backend/app backend/evaluation database scripts backend/alembic

      - name: Run backend tests
        run: pytest backend/tests -q --cov=backend/app --cov=backend/evaluation --cov-report=term-missing --cov-report=xml --cov-fail-under=75

      - name: Initialize evaluation database
        env:
          PYTHONPATH: backend
        run: |
          mkdir -p data logs
          python -c "
          import duckdb
          from pathlib import Path
          sql = open('database/init.sql').read()
          db_path = str(Path('data/database.duckdb'))
          conn = duckdb.connect(db_path)
          conn.execute(sql)
          conn.close()
          print('Tables created.')
          "
          python -m database.seed_data

      - name: Run deterministic intent evaluation
        env:
          PYTHONPATH: backend
        run: python -m evaluation.intent_evaluator

      - name: Run deterministic intent grounding evaluation
        env:
          PYTHONPATH: backend
        run: python -m evaluation.intent_grounding_evaluator

      - name: Run deterministic permission evaluation
        env:
          PYTHONPATH: backend
        run: python -m evaluation.permission_evaluator --json

  backend-tests-pg:
    name: Backend tests (PostgreSQL)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: data_analyst_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Verify PostgreSQL migrations round trip
        env:
          DATABASE_BACKEND: postgresql
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: postgres
          PG_PASSWORD: postgres
          PG_DATABASE: data_analyst_agent
        run: |
          python -m alembic -c backend/alembic.ini upgrade head
          python -m alembic -c backend/alembic.ini downgrade base
          python -m alembic -c backend/alembic.ini upgrade head

      - name: Seed PostgreSQL database
        env:
          DATABASE_BACKEND: postgresql
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: postgres
          PG_PASSWORD: postgres
          PG_DATABASE: data_analyst_agent
          PYTHONPATH: backend
        run: python -m database.seed_data

      - name: Run backend tests (PostgreSQL)
        env:
          DATABASE_BACKEND: postgresql
          PG_HOST: localhost
          PG_PORT: 5432
          PG_USER: postgres
          PG_PASSWORD: postgres
          PG_DATABASE: data_analyst_agent
        run: pytest backend/tests -q

  frontend-build:
    name: Frontend production build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend unit tests
        run: npm run test --prefix frontend

      - name: Run frontend lint
        run: npm run lint --prefix frontend

      - name: Build frontend
        run: npm run build --prefix frontend

  frontend-e2e:
    name: Frontend E2E tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright Chromium
        run: npm exec --prefix frontend playwright install --with-deps chromium

      - name: Run frontend E2E tests
        run: npm run test:e2e --prefix frontend

  docker-image-builds:
    name: Docker image builds
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate Docker Compose configuration
        run: docker compose -f docker-compose.yml config

      - name: Validate secure Docker Compose configuration
        env:
          JWT_SECRET: "0123456789abcdef0123456789abcdef"
          CORS_ALLOW_ORIGINS: https://analyst.example.com
          QWEN_API_KEY: replace-me-secure-profile
          QWEN_API_URL: https://example.com/v1/chat/completions
          QWEN_MODEL: mimo-v2.5-pro
        run: docker compose -f docker-compose.yml -f docker-compose.secure.yml config

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t data-analyst-agent-backend:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t data-analyst-agent-frontend:ci ./frontend

      - name: Smoke test backend container readiness
        env:
          QWEN_API_KEY: replace-me
          QWEN_API_URL: http://127.0.0.1:9/v1/chat/completions
          QWEN_MODEL: mimo-v2.5-pro
        run: |
          docker compose -f docker-compose.yml up -d backend
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8000/health/readiness; then
              exit 0
            fi
            docker compose -f docker-compose.yml ps
            sleep 2
          done
          docker compose -f docker-compose.yml logs backend
          exit 1

      - name: Stop Docker Compose services
        if: always()
        run: docker compose -f docker-compose.yml down -v

  secret-scan:
    name: Tracked-file secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Scan tracked files
        run: git ls-files -z | python scripts/check_secrets.py

  dependency-audit:
    name: Dependency vulnerability audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit Python dependencies
        run: |
          pip install pip-audit==2.9.0
          python -m pip_audit -r backend/requirements.txt --strict

      - name: Audit frontend dependencies
        run: |
          npm ci --prefix frontend
          npm audit --prefix frontend --audit-level=high
