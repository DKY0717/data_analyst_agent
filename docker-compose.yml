# Docker Compose 编排文件
# 一条命令启动前后端服务：docker-compose up -d

services:
  # 后端 FastAPI 服务
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # 持久化数据库和日志到宿主机
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_API_URL=${QWEN_API_URL}
      - QWEN_MODEL=${QWEN_MODEL:-mimo-v2.5-pro}
      - DATABASE_URL=duckdb:////app/data/database.duckdb
      - PROJECT_ROOT=/app
      - LOG_LEVEL=INFO
      - SANDBOX_MODE=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/readiness')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端 Nginx 服务
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
